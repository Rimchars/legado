name: Android Fast Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release-full:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Grant gradlew permission
        run: chmod +x gradlew

      - name: Prepare release version
        id: version
        run: |
          VERSION_NAME="3.$(TZ=Asia/Shanghai date +%y.%m%d%H)"
          VERSION_CODE=$(($(date -u +%s) / 60))
          TAG_NAME="archive-v2-${VERSION_NAME}"
          {
            echo "name=${VERSION_NAME}"
            echo "code=${VERSION_CODE}"
            echo "tag=${TAG_NAME}"
          } >> "$GITHUB_OUTPUT"

          cat > release-notes.md <<EOF
          阅读Archive 第二版

          五一快乐，祝大家假期阅读愉快。

          - 优化阅读页「问 AI」浮窗，支持关闭浮窗后继续后台回复。
          - 修复问 AI 请求取消或失败时显示 StandaloneCoroutine was cancelled 的问题，改为本地化提示。
          - 优化问 AI 浮窗历史、多轮会话、左右气泡、长按复制/删除和输入栏样式。
          - AI 页面和问 AI 浮窗统一支持「回车发送」设置，关闭后只能点击发送按钮。
          - 优化 AI 输入栏发送圆球，图标按按钮比例自适应，不再依赖固定 padding。
          - 修复字典弹窗顶部字典标签文字偏移、阴影错位的问题。
          - 优化主题管理应用状态、云端同步队列和日间/夜间标签样式。
          - 新增底部栏「阅读统计」入口开关，关闭后底栏不再显示统计入口。
          - 修复英文问 AI 提示词资源编译问题，提升打包稳定性。
          EOF

      - name: Build full release APK
        run: |
          ./gradlew :app:assembleAppRelease \
            -PVERSION_NAME="${{ steps.version.outputs.name }}" \
            -PVERSION_CODE="${{ steps.version.outputs.code }}" \
            -PRELEASE_STORE_FILE=ci-debug.keystore \
            -PRELEASE_STORE_PASSWORD=legado-ci-debug \
            -PRELEASE_KEY_ALIAS=legado-ci-debug \
            -PRELEASE_KEY_PASSWORD=legado-ci-debug \
            --stacktrace

      - name: Resolve APK
        id: apk
        run: |
          APK_PATH=$(find app/build/outputs/apk/app/release -type f -name '*.apk' | head -n 1)
          APK_NAME=$(basename "$APK_PATH")
          echo "path=$APK_PATH" >> "$GITHUB_OUTPUT"
          echo "name=$APK_NAME" >> "$GITHUB_OUTPUT"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: legado-release-full
          path: ${{ steps.apk.outputs.path }}

      - name: Publish versioned release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: 阅读Archive 第二版 ${{ steps.version.outputs.name }}
          prerelease: false
          make_latest: true
          generate_release_notes: false
          files: ${{ steps.apk.outputs.path }}
          body_path: release-notes.md

      - name: Refresh app update channel
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          CHANNEL_TAG="latest-arm64-release"
          RELEASE_ID=$(gh api repos/${{ github.repository }}/releases/tags/$CHANNEL_TAG --jq '.id' 2>/dev/null || true)
          if [ -n "$RELEASE_ID" ]; then
            gh api repos/${{ github.repository }}/releases/$RELEASE_ID/assets --paginate \
              --jq '.[] | select(.name | endswith(".apk")) | .id' \
              | while read -r ASSET_ID; do
                  gh api -X DELETE repos/${{ github.repository }}/releases/assets/$ASSET_ID
                done
            gh release upload "$CHANNEL_TAG" "${{ steps.apk.outputs.path }}" --clobber
            gh release edit "$CHANNEL_TAG" \
              --title "阅读Archive 更新通道" \
              --notes-file release-notes.md
          else
            gh release create "$CHANNEL_TAG" "${{ steps.apk.outputs.path }}" \
              --title "阅读Archive 更新通道" \
              --notes-file release-notes.md
          fi
