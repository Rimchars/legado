<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <style>
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #f7f3ea;
    }
    #viewer {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }
  </style>
  <script src="jszip.min.js"></script>
  <script src="epub.min.js"></script>
</head>
<body>
  <div id="viewer"></div>
  <script>
    let book = null;
    let rendition = null;
    let tocItems = [];
    let activeChapterIndex = 0;
    let pendingRestoreScroll = 0;
    let reportTimer = 0;

    function notify(type, payload) {
      if (window.AndroidBridge && AndroidBridge.onEvent) {
        AndroidBridge.onEvent(type, JSON.stringify(payload || {}));
      }
    }

    function applyTheme() {
      if (!rendition || !window.AndroidBridge) return;
      const style = JSON.parse(AndroidBridge.getStyle());
      document.body.style.background = style.background || "#f7f3ea";
      rendition.themes.default({
        "html": {
          "background": style.background || "#f7f3ea"
        },
        "body": {
          "background": style.background || "#f7f3ea",
          "color": style.color || "#2f2a24",
          "line-height": style.lineHeight || "1.55",
          "font-size": style.fontSize || "100%",
          "font-family": style.fontFamily || "sans-serif",
          "letter-spacing": style.letterSpacing || "normal",
          "padding": style.padding || "0 16px",
          "box-sizing": "border-box"
        },
        "p": {
          "margin-top": "0",
          "margin-bottom": style.paragraphSpacing || "0.8em"
        },
        "img": {
          "max-width": "100%",
          "height": "auto",
          "object-fit": "contain"
        },
        "svg": {
          "max-width": "100%",
          "height": "auto"
        },
        "body > div:only-child svg:only-child": {
          "display": "block",
          "width": "100%",
          "height": "auto"
        }
      });
    }

    function injectContentStyles(contents) {
      const css = `
        html, body {
          background: transparent !important;
          height: auto !important;
          min-height: 100% !important;
          overflow-x: hidden !important;
          overflow-y: auto !important;
        }
        body {
          box-sizing: border-box !important;
        }
        img, svg, image {
          max-width: 100% !important;
          object-fit: contain !important;
          break-inside: avoid !important;
          page-break-inside: avoid !important;
        }
        img {
          height: auto !important;
          max-height: none !important;
        }
        svg {
          height: auto !important;
          max-height: none !important;
          overflow: visible !important;
        }
        body > div:only-child,
        body > p:only-child,
        body > figure:only-child {
          max-height: none !important;
          overflow: visible !important;
        }
        body > div:only-child svg:only-child,
        body > div:only-child img:only-child,
        body > p:only-child img:only-child,
        body > figure:only-child img:only-child {
          display: block !important;
          width: 100% !important;
          height: auto !important;
          max-height: none !important;
          margin-left: auto !important;
          margin-right: auto !important;
        }
        [style*="height: 100%"], [style*="height:100%"] {
          height: auto !important;
          max-height: none !important;
        }
      `;
      try {
        contents.addStylesheetRules({ "body": { "background": "transparent !important" } });
        contents.addStylesheet("data:text/css;charset=utf-8," + encodeURIComponent(css));
      } catch (e) {
        const doc = contents.document;
        if (doc && doc.head) {
          const style = doc.createElement("style");
          style.textContent = css;
          doc.head.appendChild(style);
        }
      }
      bindScrollReporter(contents);
    }

    function bindScrollReporter(contents) {
      const win = contents.window;
      if (!win) return;
      win.removeEventListener("scroll", scheduleLocationReport);
      win.addEventListener("scroll", scheduleLocationReport, { passive: true });
      const outer = getOuterScroller();
      if (outer) {
        outer.removeEventListener("scroll", scheduleLocationReport);
        outer.addEventListener("scroll", scheduleLocationReport, { passive: true });
      }
    }

    function scheduleLocationReport() {
      clearTimeout(reportTimer);
      reportTimer = setTimeout(reportLocation, 120);
    }

    function flattenToc(items, out) {
      (items || []).forEach(item => {
        if (item && item.href) {
          out.push({
            href: item.href,
            label: item.label || item.href
          });
        }
        if (item && item.subitems && item.subitems.length) {
          flattenToc(item.subitems, out);
        }
      });
      return out;
    }

    function sameHref(a, b) {
      if (!a || !b) return false;
      const left = String(a).split("#")[0];
      const right = String(b).split("#")[0];
      return left === right || left.endsWith(right) || right.endsWith(left);
    }

    function updateActiveChapter(href) {
      const index = tocItems.findIndex(item => sameHref(href, item.href));
      if (index >= 0) {
        activeChapterIndex = index;
      }
      return activeChapterIndex;
    }

    function getActiveContents() {
      if (!rendition || !rendition.getContents) return null;
      const contents = rendition.getContents();
      return contents && contents.length ? contents[0] : null;
    }

    function getOuterScroller() {
      return document.querySelector(".epub-container") || document.getElementById("viewer");
    }

    function getScrollPort() {
      const contents = getActiveContents();
      const win = contents && contents.window;
      const doc = contents && contents.document;
      if (win && doc) {
        const root = doc.scrollingElement || doc.documentElement || doc.body;
        const height = Math.max(
          root.scrollHeight || 0,
          doc.body ? doc.body.scrollHeight : 0
        );
        const viewHeight = win.innerHeight || root.clientHeight || 0;
        const max = Math.max(0, height - viewHeight);
        if (max > 8) {
          return {
            top: win.scrollY || root.scrollTop || 0,
            max,
            height: viewHeight,
            scrollTo: y => win.scrollTo(0, y)
          };
        }
      }
      const outer = getOuterScroller();
      if (!outer) {
        return { top: 0, max: 0, height: 0, scrollTo: () => {} };
      }
      const viewHeight = outer.clientHeight || window.innerHeight || 0;
      return {
        top: outer.scrollTop || 0,
        max: Math.max(0, (outer.scrollHeight || 0) - viewHeight),
        height: viewHeight,
        scrollTo: y => {
          outer.scrollTop = y;
        }
      };
    }

    function reportLocation() {
      const metrics = getScrollPort();
      notify("location", {
        cfi: "",
        chapterIndex: activeChapterIndex,
        scrollTop: Math.round(metrics.top),
        scrollMax: Math.round(metrics.max)
      });
    }

    function createRendition() {
      rendition = book.renderTo("viewer", {
        width: "100%",
        height: "100%",
        flow: "scrolled-doc",
        manager: "default",
        spread: "none"
      });
      applyTheme();
      rendition.hooks.content.register(injectContentStyles);
      rendition.on("rendered", section => {
        const chapterIndex = updateActiveChapter(section.href);
        notify("chapter", { href: section.href, title: section.label || "", chapterIndex });
        setTimeout(() => {
          if (pendingRestoreScroll > 0) {
            getScrollPort().scrollTo(pendingRestoreScroll);
            pendingRestoreScroll = 0;
          } else {
            getScrollPort().scrollTo(0);
          }
          reportLocation();
        }, 120);
      });
    }

    async function openBook() {
      try {
        if (!window.JSZip) {
          throw new Error("JSZip lib not loaded");
        }
        if (!window.ePub) {
          throw new Error("epub.js lib not loaded");
        }
        const bookUrl = AndroidBridge.getBookUrl();
        if (!bookUrl) {
          throw new Error("EPUB OPF url is empty");
        }
        book = ePub(bookUrl);
        createRendition();
        await book.ready;
        tocItems = flattenToc((book.navigation && book.navigation.toc) || [], []);
        notify("toc", {
          toc: (book.navigation && book.navigation.toc) || []
        });
        const savedIndex = AndroidBridge.getSavedChapterIndex ? AndroidBridge.getSavedChapterIndex() : 0;
        pendingRestoreScroll = AndroidBridge.getSavedScrollTop ? AndroidBridge.getSavedScrollTop() : 0;
        const savedHref = tocItems[savedIndex] && tocItems[savedIndex].href;
        await rendition.display(savedHref || undefined);
        notify("ready", {});
      } catch (e) {
        notify("error", { message: String(e && e.message ? e.message : e) });
      }
    }

    function scrollPage(direction) {
      const metrics = getScrollPort();
      const step = Math.max(160, Math.floor(metrics.height * 0.86));
      if (direction > 0) {
        if (metrics.top >= metrics.max - 8) {
          notify("pageBoundary", { direction: 1 });
        } else {
          metrics.scrollTo(Math.min(metrics.max, metrics.top + step));
          setTimeout(reportLocation, 80);
        }
      } else if (direction < 0) {
        if (metrics.top <= 8) {
          notify("pageBoundary", { direction: -1 });
        } else {
          metrics.scrollTo(Math.max(0, metrics.top - step));
          setTimeout(reportLocation, 80);
        }
      }
    }

    function display(cfiOrHref) {
      if (!rendition || !cfiOrHref) return;
      pendingRestoreScroll = 0;
      rendition.display(cfiOrHref);
    }

    function setStyle() {
      applyTheme();
    }

    function setScrollMode() {
      setStyle();
    }

    document.addEventListener("DOMContentLoaded", openBook);
  </script>
</body>
</html>
